server {
    listen 80;

    client_max_body_size 200m;

    # Backend API (FastAPI) — its own routes already start with /api, so
    # the request URI is forwarded to the backend unmodified.
    location /api/ {
        proxy_pass http://backend:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # The AI explain/urban-planning-solution endpoints call a local LLM
        # and can legitimately take 30-90+ seconds. Nginx's stock 60s
        # proxy_read_timeout was cutting those connections early and
        # returning a bare 504 to the browser instead of the real answer.
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Everything else — the React/Vite SPA.
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
