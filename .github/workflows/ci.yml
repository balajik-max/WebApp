name: Project Safety Check

# Run this automation whenever someone sends a Pull Request to Sub_Master
on:
  pull_request:
    branches: [ Sub_Master ]

jobs:
  test-and-verify:
    runs-on: ubuntu-latest

    steps:
    # 1. Download the code from the pull request branch
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Set up Python on the automation server
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install dependencies if you have a requirements file
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Run your project's validation pipeline script
    - name: Run Pipeline Verification
      working-directory: backend
      run: |
        echo "Running pipeline verification..."
        python verify_pipeline.py